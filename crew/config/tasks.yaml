rag_task:
  description: >
    Use the RAG pipeline tool to extract meaningful context and information.
    Format the output as a list.
  expected_output: >
    Important information matching with given query.
    Meaningful and key points context for next research task.
  verbose: true
researcher_task: 
  description: >
    your task is to research on given query and context based on ancistor tools
    Your task is to research on the content to get some important and unique points based on factual data.
  expected_output: >
    The output must have information in number of points.
    Don't include tables
    No special keywords
    No symbols
    Include only charecters, numbers, punctuations etc.
  verbose: true
writer_task:
  description: >
    Write a creative LinkedIn post based on the research report.
    The post should be engaging, human-like, and optimized for LinkedIn engagement.
    After generating the post, you MUST use the write_to_file tool to save it into a .txt file.
  expected_output: >
    A LinkedIn post that has been saved into a file using the write_to_file tool.
    The post must include:
    - A strong tagline aligned with the research report
    - A thought-provoking question for the reader
    - 2-4 factual points or skill explanations
    - A short conclusion (1-2 lines)
    - A final engagement question
    - No emojis or special unicode characters
    - No icons or symbols
    - Only use standard ASCII characters (letters, numbers, punctuation)
    - Formal and engaging tone
  verbose: true